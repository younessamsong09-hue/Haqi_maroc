<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حقي السيادية 🇲🇦</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .header { background: linear-gradient(45deg, #1e5631, #c1272d); padding: 20px; border-bottom: 3px solid #daa520; }
        .btn-gold { width: 90%; padding: 20px; background: #daa520; color: #000; font-weight: bold; border: none; border-radius: 12px; margin-top: 20px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .stat-bar { background: linear-gradient(90deg, #111, #1e5631); padding: 15px; margin-top: 20px; display: flex; justify-content: space-around; font-size: 12px; }
        #portal { display: none; background: #0a0a0a; padding: 20px; border: 1px solid #daa520; margin: 15px; border-radius: 15px; }
        textarea { width: 100%; height: 100px; background: #000; color: #fff; border: 1px solid #333; padding: 10px; margin: 10px 0; }
        .wa-float { position: fixed; bottom: 20px; left: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; text-decoration: none; z-index: 1000; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0;">🇲🇦 بوابة حقي السيادية</h2>
        <p style="font-size:10px;">نظام الدفاع الرقمي عن حقوق المواطن</p>
    </div>

    <button class="btn-gold" onclick="document.getElementById('portal').style.display='block'">⚖️ ابدأ محرك العدالة (رفع تظلم)</button>

    <div id="portal">
        <h4 style="color:#daa520;">صياغة شكاية مدعمة بـ GPS</h4>
        <textarea id="case" placeholder="اكتب تفاصيل الظلم هنا..."></textarea>
        <button onclick="getGPS()" style="width:100%; padding:10px; background:#1e5631; color:white; border:none; margin-bottom:10px;">📍 توثيق الموقع (GPS)</button>
        <div id="gps-stat" style="font-size:10px; color:#888;">الموقع: لم يحدد بعد</div>
        <button onclick="generate()" style="width:100%; padding:10px; background:#c1272d; color:white; border:none;">توليد الوثيقة</button>
        <div id="res" style="display:none; background:white; color:black; padding:10px; margin-top:10px; white-space:pre-wrap; text-align:right;"></div>
    </div>

    <div class="grid">
        <div class="card"><i class="fas fa-book-scale" style="color:#daa520;"></i><br>رادار القوانين</div>
        <div class="card"><i class="fas fa-search-location" style="color:#daa520;"></i><br>مفقودات تاوريرت</div>
        <div class="card"><i class="fas fa-id-card" style="color:#daa520;"></i><br>دليل المساطر</div>
        <div class="card"><i class="fas fa-headset" style="color:#daa520;"></i><br>دعم حقوقي</div>
    </div>

    <div class="stat-bar">
        <div><b style="color:#daa520;">+1,500</b><br>مستفيد</div>
        <div><b style="color:#daa520;">524</b><br>شكاية</div>
        <div><b style="color:#daa520;">2026</b><br>تاوريرت</div>
    </div>

    <a href="https://wa.me/212XXXXXXXX" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script>
        let coords = "غير محدد";
        function getGPS() {
            navigator.geolocation.getCurrentPosition(p => {
                coords = `${p.coords.latitude}, ${p.coords.longitude}`;
                document.getElementById('gps-stat').innerText = "✅ تم التوثيق: " + coords;
            });
        }
        function generate() {
            const r = document.getElementById('res');
            r.style.display = 'block';
            r.innerText = `إلى السيد وكيل الملك \nتظلم رقمي \nالواقعة: ${document.getElementById('case').value}\nGPS: ${coords}`;
        }
    </script>
</body>
</html>
