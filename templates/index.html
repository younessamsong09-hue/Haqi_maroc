<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حقي المغرب - Haqi Maroc</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e5631; --secondary: #c1272d; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 50px 50px; }
        .search-container { max-width: 500px; margin: -30px auto 20px; padding: 0 20px; }
        .search-box { display: flex; background: white; padding: 10px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .search-box input { border: none; flex: 1; padding: 10px 20px; font-size: 16px; outline: none; }
        .search-box button { background: #333; color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; }
        .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-5px); border-bottom: 4px solid var(--secondary); }
        .card i { font-size: 24px; color: var(--primary); margin-bottom: 10px; }
        #results { max-width: 600px; margin: 20px auto; padding: 0 20px; }
        .result-item { background: white; padding: 20px; border-radius: 15px; border-right: 5px solid var(--secondary); margin-bottom: 15px; }
        .complaint-form { background: #fff; padding: 25px; border-radius: 20px; margin-top: 20px; display: none; border: 1px solid #ddd; }
        .complaint-form input, .complaint-form textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-generate { background: var(--primary); color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #complaint-output { white-space: pre-wrap; background: #f9f9f9; padding: 15px; border: 1px dashed var(--primary); margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>حقي (Haqi Maroc)</h1>
        <p>المنصة الذكية للقطاعات السيادية ودعم المواطن</p>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="query" placeholder="اكتب ما حدث معك.. (مثلاً: حكرة)">
            <button onclick="search()">بحث</button>
        </div>
    </div>

    <div class="cards-grid" id="quick-cards"></div>
    <div id="results"></div>

    <div id="form-container" class="search-container">
        <div id="complaint-form" class="complaint-form">
            <h3>📝 مولد الشكاية القانونية</h3>
            <input type="text" id="user-name" placeholder="اسمك الكامل">
            <input type="text" id="user-city" placeholder="المدينة">
            <input type="text" id="target-name" placeholder="المشتكى به (مثلاً: قائد الملحقة...)">
            <textarea id="incident-details" placeholder="تفاصيل الواقعة باختصار..."></textarea>
            <button class="btn-generate" onclick="generate()">توليد الشكاية الآن</button>
            <div id="complaint-output"></div>
        </div>
    </div>

    <script>
        async function loadCards() {
            const res = await fetch('/get_cards');
            const cards = await res.json();
            const container = document.getElementById('quick-cards');
            container.innerHTML = cards.map(c => `
                <div class="card" onclick="quickSearch('${c.search_term}')">
                    <i class="fas ${c.icon}"></i>
                    <div>${c.title}</div>
                </div>
            `).join('');
        }

        async function search() {
            const q = document.getElementById('query').value;
            const res = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prompt: q})
            });
            const data = await res.json();
            const resultsDiv = document.getElementById('results');
            const form = document.getElementById('complaint-form');
            
            if(data.found) {
                resultsDiv.innerHTML = data.results.map(r => `
                    <div class="result-item">
                        <h4>${r.title}</h4>
                        <p>${r.content}</p>
                    </div>
                `).join('');
                // إظهار النموذج إذا كان البحث يتعلق بالشكايات
                form.style.display = q.includes('شكاية') || q.includes('حكرة') || q.includes('ظلم') ? 'block' : 'none';
            } else {
                resultsDiv.innerHTML = '<div class="result-item">لم نجد نتائج دقيقة، جرب كلمات أخرى مثل (رشوة، باسبور، حكرة).</div>';
                form.style.display = 'none';
            }
        }

        async function generate() {
            const data = {
                name: document.getElementById('user-name').value,
                city: document.getElementById('user-city').value,
                target: document.getElementById('target-name').value,
                details: document.getElementById('incident-details').value
            };
            const res = await fetch('/generate_complaint', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            const output = document.getElementById('complaint-output');
            output.innerText = result.text;
            output.style.display = 'block';
        }

        function quickSearch(term) {
            document.getElementById('query').value = term;
            search();
        }

        loadCards();
    </script>
</body>
</html>
