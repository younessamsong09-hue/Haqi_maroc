<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>بوابة حقي السيادية 🇲🇦</title>
</head>
<body style="background: #000; color: white; font-family: sans-serif;">
    <div class="header" style="background: linear-gradient(to right, #1e5631, #c1272d); padding: 20px; text-align: center; border-bottom: 3px solid #daa520;">
        <h1 style="color: #daa520; margin: 0;">🇲🇦 بوابة حقي السيادية</h1>
        <p style="font-size: 12px;">نظام الدفاع الرقمي عن حقوق المواطن</p>
    </div>

    <div id="main-ui" style="padding: 20px;">
        <button onclick="startJustice()" style="width:100%; padding:25px; background:linear-gradient(45deg, #daa520, #8a6d3b); border:none; border-radius:15px; font-weight:bold; font-size:18px; cursor:pointer; box-shadow: 0 0 20px rgba(218,165,32,0.4);">🛡️ ابدأ محرك العدالة (رفع تظلم)</button>
        
        <div id="justice-portal" style="display:none; margin-top:20px; background:#111; padding:20px; border:1px solid #daa520; border-radius:15px;">
            <h3 style="color:#daa520;">⚖️ صياغة شكاية قانونية مدعمة بـ GPS</h3>
            <textarea id="case" placeholder="اكتب هنا تفاصيل الحكرة أو الظلم..." style="width:100%; height:120px; background:#000; color:white; border:1px solid #333; padding:10px; border-radius:8px;"></textarea>
            <div id="gps-stat" style="margin:10px 0; font-size:12px; color:#aaa;">📍 الموقع: لم يحدد بعد</div>
            <button onclick="getGPS()" style="width:100%; padding:10px; background:#1e5631; color:white; border:none; border-radius:8px; margin-bottom:10px;">🌍 توثيق المكان (GPS)</button>
            <button onclick="generate()" style="width:100%; padding:15px; background:#c1272d; color:white; font-weight:bold; border:none; border-radius:10px;">توليد الوثيقة القانونية</button>
            <div id="result" style="display:none; margin-top:20px; padding:15px; background:#fff; color:#000; font-family:serif; border-radius:5px; white-space:pre-wrap;"></div>
        </div>
    </div>

    <script>
        let coords = "غير محدد";
        function startJustice() { document.getElementById('justice-portal').style.display = 'block'; }
        function getGPS() {
            navigator.geolocation.getCurrentPosition(p => {
                coords = `خط عرض: ${p.coords.latitude}, خط طول: ${p.coords.longitude}`;
                document.getElementById('gps-stat').innerText = "✅ تم توثيق الموقع: " + coords;
            });
        }
        function generate() {
            const r = document.getElementById('result');
            r.style.display = 'block';
            r.innerText = `إلى السيد وكيل الملك \nالموضوع: شكاية تظلم رقمية \n\nأنا الموقع أسفله... أبلغ عن واقعة: ${document.getElementById('case').value}\n\nتوثيق الموقع (GPS): ${coords}\nالتاريخ: ${new Date().toLocaleString()}`;
        }
    </script>
</body>
</html>
