<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حقي (Haqi Maroc) - المنصة الذكية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --main-green: #1a5e32; --alert-red: #c0392b; }
        body { background: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .hero { background: linear-gradient(135deg, var(--main-green), #2d8a4e); color: white; padding: 60px 0; border-radius: 0 0 40px 40px; }
        .search-box { margin-top: -35px; background: white; border-radius: 35px; padding: 12px; box-shadow: 0 15px 30px rgba(0,0,0,0.12); border: 1px solid #eee; }
        .example-card { cursor: pointer; border-radius: 20px; transition: 0.3s; border: none; background: white; }
        .example-card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .result-card { border-radius: 15px; border: none; transition: 0.3s; }
        .btn-round { border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>

<div class="hero text-center">
    <h1 class="fw-bold">حقي (Haqi Maroc)</h1>
    <p class="lead">المنصة الذكية لكشف التجاوزات ودعم الضعفاء قانونياً</p>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="search-box d-flex align-items-center">
                <input type="text" id="user-query" class="form-control border-0 bg-transparent fs-5" placeholder="اكتب ما حدث معك.. (مثلاً: طلبوا مني رشوة)">
                <button onclick="smartSearch()" class="btn btn-dark btn-round px-5 py-2 ms-2">بحث</button>
            </div>
            
            <div id="quick-cards-area" class="row g-3 mt-4">
                </div>
        </div>
    </div>

    <div id="results-area" class="mt-5 pb-5">
        </div>
</div>

<script>
// 1. جلب البطاقات السريعة عند التحميل
window.onload = async function() {
    const res = await fetch('/get_cards');
    const cards = await res.json();
    const area = document.getElementById('quick-cards-area');
    cards.forEach(card => {
        area.innerHTML += `
            <div class="col-6 col-md-3">
                <div class="card example-card p-3 text-center shadow-sm" onclick="fillSearch('${card.search_term}')">
                    <i class="${card.icon} mb-2 fa-2x text-success"></i>
                    <h6 class="fw-bold mb-1">${card.title}</h6>
                    <small class="text-muted" style="font-size: 0.7rem;">${card.subtitle || ''}</small>
                </div>
            </div>`;
    });
};

function fillSearch(t) { 
    document.getElementById('user-query').value = t; 
    smartSearch(); 
}

// 2. محرك البحث الذكي والربط بالأدوات
async function smartSearch() {
    const query = document.getElementById('user-query').value;
    const resArea = document.getElementById('results-area');
    if(!query) return;

    resArea.innerHTML = '<div class="text-center my-5"><div class="spinner-border text-success"></div><p class="mt-2">جاري البحث في القطاعات...</p></div>';

    try {
        const response = await fetch('/ask', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt: query})
        });
        const data = await response.json();

        resArea.innerHTML = '';
        if(data.found) {
            data.results.forEach((item, index) => {
                const isShield = item.type === "shield_tool"; // قطاع الحماية
                const isFinance = item.type === "finance_tool" || item.keywords.includes("دواء"); // قطاع المالية/الصحة

                // تحديد زر الوجهة التلقائي
                let actionBtn = "";
                if (isShield) {
                    actionBtn = `<a href="/generator" class="btn btn-danger btn-round w-100 mb-3 shadow-sm">افتح محرر الشكايات القانونية</a>`;
                } else if (isFinance) {
                    actionBtn = `<a href="/finance" class="btn btn-success btn-round w-100 mb-3 shadow-sm">افتح الحاسبة المالية</a>`;
                }

                resArea.innerHTML += `
                    <div class="card result-card shadow-sm p-4 mb-4" style="border-right: 10px solid ${isShield ? 'var(--alert-red)' : 'var(--main-green)'}">
                        <div class="d-flex justify-content-between align-items-start">
                            <h3 class="${isShield ? 'text-danger' : 'text-success'} fw-bold">${item.title}</h3>
                            <span class="badge bg-light text-dark border">${isShield ? 'قطاع الحماية' : 'قطاع الخدمات'}</span>
                        </div>
                        <p class="fs-5 text-muted mt-2">${item.docs}</p>
                        
                        <div class="row g-2 mt-2">
                            <div class="col-md-6">${actionBtn}</div>
                            ${item.phone ? `
                            <div class="col-md-6">
                                <a href="tel:${item.phone}" class="btn btn-outline-dark btn-round w-100 shadow-sm">
                                    <i class="fas fa-phone-alt me-2"></i> اتصل بالخط المباشر: ${item.phone}
                                </a>
                            </div>` : ''}
                        </div>

                        ${item.official_site ? `<div class="text-center mt-2"><a href="${item.official_site}" target="_blank" class="text-decoration-none text-secondary small"><i class="fas fa-external-link-alt"></i> الانتقال للموقع الرسمي للحكومة</a></div>` : ''}

                        ${item.template ? `
                            <div class="bg-light p-3 rounded-4 mt-4 border shadow-inner">
                                <h6 class="fw-bold"><i class="fas fa-pen-nib me-2"></i> مسودة سريعة:</h6>
                                <textarea id="txt-${index}" class="form-control mb-3 border-0 shadow-sm" rows="4">${item.template}</textarea>
                                <div class="d-flex gap-2">
                                    <button onclick="sendToWhatsApp('txt-${index}')" class="btn btn-primary btn-round w-50">إرسال WhatsApp</button>
                                    <button onclick="makePDF('txt-${index}', '${item.title}')" class="btn btn-outline-danger btn-round w-50">حفظ PDF</button>
                                </div>
                            </div>` : ''}
                    </div>`;
            });
        } else {
            resArea.innerHTML = `
                <div class="alert alert-light border shadow-sm text-center py-5 rounded-4">
                    <i class="fas fa-search mb-3 fa-3x text-muted"></i>
                    <h4>لم نجد نتائج دقيقة لـ "${query}"</h4>
                    <p class="text-muted">جرب كلمات مثل: رشوة، دواء، حكرة، دعم.</p>
                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <a href="/generator" class="btn btn-outline-danger btn-round">كتابة شكاية عامة</a>
                        <a href="/finance" class="btn btn-outline-success btn-round">الحاسبة المالية</a>
                    </div>
                </div>`;
        }
    } catch (err) {
        resArea.innerHTML = '<div class="alert alert-danger text-center">حدث خطأ في الاتصال بالسيرفر.</div>';
    }
}

// وظائف المساعدة
function sendToWhatsApp(id) {
    const text = document.getElementById(id).value;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

function makePDF(id, title) {
    const el = document.createElement('div');
    el.innerHTML = `<div style="direction:rtl; padding:50px; font-family:Arial;">
        <h1 style="color:#1a5e32; text-align:center;">Haqi Maroc - وثيقة رسمية</h1>
        <hr>
        <h3>الموضوع: ${title}</h3>
        <p style="font-size:1.2rem; line-height:2;">${document.getElementById(id).value}</p>
        <br><p>توقيع المواطن: .......................</p>
    </div>`;
    html2pdf().from(el).set({margin: 1, filename: `${title}.pdf`, image: {type:'jpeg', quality:0.98}}).save();
}
</script>
</body>
</html>
