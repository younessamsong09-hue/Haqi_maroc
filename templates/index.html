<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haqi Maroc - منصة الحقوق</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --main-green: #1a5e32; --alert-red: #c0392b; }
        body { background: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .hero { background: linear-gradient(135deg, var(--main-green), #2d8a4e); color: white; padding: 40px 0; border-radius: 0 0 30px 30px; }
        .search-box { margin-top: -30px; background: white; border-radius: 30px; padding: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .example-card { cursor: pointer; border-radius: 15px; transition: 0.3s; border: none; }
        .example-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="hero text-center">
    <h1 class="fw-bold">حقي (Haqi Maroc)</h1>
    <p>منصة الدفاع عن الحقوق والخدمات القانونية</p>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="search-box d-flex">
                <input type="text" id="user-query" class="form-control border-0 bg-transparent" placeholder="ما هي مشكلتك؟">
                <button onclick="smartSearch()" class="btn btn-dark rounded-pill px-4">بحث</button>
            </div>
            <div id="quick-cards-area" class="row g-2 mt-4"></div>
        </div>
    </div>
    <div id="results-area" class="mt-5 pb-5"></div>
</div>

<script>
// 1. جلب البطاقات عند تشغيل الموقع
window.onload = async function() {
    const res = await fetch('/get_cards');
    const cards = await res.json();
    const area = document.getElementById('quick-cards-area');
    cards.forEach(card => {
        area.innerHTML += `
            <div class="col-6 col-md-3">
                <div class="card example-card p-3 text-center shadow-sm" onclick="fillSearch('${card.search_term}')">
                    <i class="${card.icon} mb-2 fa-lg text-success"></i>
                    <h6 class="small fw-bold mb-0">${card.title}</h6>
                </div>
            </div>`;
    });
};

function fillSearch(t) { document.getElementById('user-query').value = t; smartSearch(); }

// 2. محرك البحث والربط مع الخدمات المنفصلة
async function smartSearch() {
    const query = document.getElementById('user-query').value;
    const resArea = document.getElementById('results-area');
    resArea.innerHTML = '<div class="text-center"><div class="spinner-border text-success"></div></div>';

    const response = await fetch('/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt: query})
    });
    const data = await response.json();

    resArea.innerHTML = '';
    if(data.found) {
        data.results.forEach((item, index) => {
            const isShield = item.type === "shield_tool";
            resArea.innerHTML += `
                <div class="card shadow-sm p-4 mb-3" style="border-right: 8px solid ${isShield ? 'var(--alert-red)' : 'var(--main-green)'}">
                    <h4 class="${isShield ? 'text-danger' : 'text-success'}">${item.title}</h4>
                    <p>${item.docs}</p>
                    ${item.phone ? `<a href="tel:${item.phone}" class="btn btn-outline-success mb-3"><i class="fas fa-phone"></i> اتصل الآن: ${item.phone}</a>` : ''}
                    ${item.template ? `
                        <div class="bg-light p-3 rounded">
                            <h6>📝 مسودة البلاغ:</h6>
                            <textarea id="txt-${index}" class="form-control mb-2" rows="3">${item.template}</textarea>
                            <div class="d-flex gap-2">
                                <button onclick="sendToWhatsApp('txt-${index}')" class="btn btn-primary w-50">واتساب</button>
                                <button onclick="makePDF('txt-${index}', '${item.title}')" class="btn btn-danger w-50">PDF</button>
                            </div>
                        </div>` : ''}
                </div>`;
        });
    } else { resArea.innerHTML = '<div class="alert alert-warning text-center">لا توجد نتائج دقيقة.</div>'; }
}

function sendToWhatsApp(id) { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById(id).value)}`); }
function makePDF(id, title) {
    const el = document.createElement('div');
    el.innerHTML = `<div style="direction:rtl; padding:40px;"><h2>${title}</h2><hr><p>${document.getElementById(id).value}</p></div>`;
    html2pdf().from(el).save(`${title}.pdf`);
}
</script>
</body>
</html>
