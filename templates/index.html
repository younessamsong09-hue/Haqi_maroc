<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حقي - محرك العدالة 🇲🇦</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; text-align: center; }
        .header { background: linear-gradient(45deg, #1e5631, #c1272d); padding: 30px; border-bottom: 4px solid #daa520; }
        .btn-main { width: 90%; padding: 20px; margin: 20px 0; background: #daa520; color: #000; font-weight: bold; border: none; border-radius: 12px; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(218,165,32,0.3); }
        .portal-box { display: none; background: #111; margin: 15px; padding: 20px; border: 1px solid #daa520; border-radius: 15px; }
        textarea { width: 100%; height: 120px; background: #000; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .share-unit { display: none; margin-top: 20px; }
        .btn-share { width: 48%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .whatsapp { background: #25D366; color: white; }
        .sms { background: #007bff; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0;">🛡️ بوابة حقي السيادية</h1>
        <p>لا ضياع للحقوق مع التوثيق الرقمي</p>
    </div>

    <button class="btn-main" onclick="showPortal()">⚖️ صياغة شكاية (محرك العدالة)</button>

    <div id="portal" class="portal-box">
        <h3 style="color:#daa520;">وثّق تظلمك الآن</h3>
        <textarea id="caseText" placeholder="اكتب تفاصيل ما حدث معك بوضوح..."></textarea>
        
        <div id="gps-info" style="font-size:12px; color:#888; margin-bottom:10px;">📍 الموقع الجغرافي: غير محدد</div>
        <button onclick="getGPS()" style="background:#1e5631; color:white; width:100%; padding:10px; border:none; border-radius:5px; cursor:pointer;">🌍 تثبيت الموقع (GPS)</button>
        
        <button onclick="generateDoc()" style="background:#c1272d; color:white; width:100%; padding:15px; border:none; border-radius:10px; margin-top:10px; font-weight:bold;">توليد الشكاية القانونية</button>

        <div id="finalDoc" style="display:none; background:white; color:black; padding:15px; margin-top:20px; text-align:right; border-radius:5px; font-family:serif; white-space:pre-wrap;"></div>

        <div id="shareSection" class="share-unit">
            <p style="color:#daa520;">📢 انشر تظلمك للجهات الحقوقية:</p>
            <button class="btn-share whatsapp" onclick="shareWA()">WhatsApp</button>
            <button class="btn-share sms" onclick="shareSMS()">SMS</button>
        </div>
    </div>

    <script>
        let myCoords = "لم يتم التحديد";
        function showPortal() { document.getElementById('portal').style.display = 'block'; }
        
        function getGPS() {
            navigator.geolocation.getCurrentPosition(p => {
                myCoords = `${p.coords.latitude}, ${p.coords.longitude}`;
                document.getElementById('gps-info').innerText = "✅ تم التوثيق: " + myCoords;
            });
        }

        function generateDoc() {
            const text = document.getElementById('caseText').value;
            const doc = `إلى السيد وكيل الملك المحترم\nشكاية تظلم رسمية\n\nأبلغكم عن الواقعة التالية: ${text}\n\nموقع الحادث (GPS): ${myCoords}\nالتاريخ: ${new Date().toLocaleString()}\n\nحرر عبر بوابة حقي السيادية.`;
            document.getElementById('finalDoc').innerText = doc;
            document.getElementById('finalDoc').style.display = 'block';
            document.getElementById('shareSection').style.display = 'flex';
            document.getElementById('shareSection').style.justifyContent = 'space-between';
        }

        function shareWA() {
            const msg = encodeURIComponent(document.getElementById('finalDoc').innerText);
            window.open(`https://wa.me/?text=${msg}`);
        }

        function shareSMS() {
            const msg = encodeURIComponent(document.getElementById('finalDoc').innerText);
            window.location.href = `sms:?body=${msg}`;
        }
    </script>
</body>
</html>
