<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حقي - منصة دعم المواطن</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --main-green: #1a5e32; --alert-red: #c0392b; }
        body { background: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section { background: linear-gradient(135deg, var(--main-green), #2d8a4e); color: white; padding: 60px 0; border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; }
        .search-box { margin-top: -30px; background: white; padding: 10px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .search-input { border: none; padding: 15px 25px; width: 85%; border-radius: 30px; outline: none; }
        .result-card { border: none; border-radius: 20px; transition: 0.3s; margin-bottom: 20px; border-right: 8px solid var(--main-green); }
        .shield-mode { border-right: 8px solid var(--alert-red); background: #fff5f5; }
    </style>
</head>
<body>

<section class="hero-section text-center">
    <div class="container">
        <h1><i class="fas fa-balance-scale"></i> حقي (Haqi Maroc)</h1>
        <p>المنصة الذكية لكشف التجاوزات ودعم الضعفاء قانونياً</p>
    </div>
</section>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="search-box d-flex align-items-center">
                <input type="text" id="user-query" class="search-input" placeholder="اكتب ما حدث معك.. (مثلاً: طلبوا مني رشوة، تعويض الدواء، الحكرة)">
                <button onclick="smartSearch()" class="btn btn-dark rounded-circle p-3"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </div>

    <div id="results-area" class="mt-5">
        </div>
</div>

<script>
async function smartSearch() {
    const query = document.getElementById('user-query').value;
    const resArea = document.getElementById('results-area');
    if(!query) return;

    resArea.innerHTML = '<div class="text-center"><div class="spinner-border text-success"></div> <p>جاري تحليل الحالة قانونياً...</p></div>';

    const response = await fetch('/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt: query})
    });
    const data = await response.json();

    resArea.innerHTML = '';
    if(data.found) {
        data.results.forEach(item => {
            const isShield = item.type === "shield_tool";
            resArea.innerHTML += `
                <div class="card result-card ${isShield ? 'shield-mode' : ''} p-4 shadow-sm">
                    <h3 class="${isShield ? 'text-danger' : 'text-success'}">${isShield ? '🛡️' : 'ℹ️'} ${item.title}</h3>
                    <p class="mt-2">${item.docs}</p>
                    ${isShield ? `<div class="alert alert-warning"><b>السند القانوني:</b> ${item.law_article}</div>` : ''}
                    <textarea id="story-${item.title}" class="form-control mb-3" placeholder="اكتب تفاصيل الواقعة هنا لتوليد البلاغ..."></textarea>
                    <button onclick="generateReport('${item.title}', '${item.law_article}')" class="btn ${isShield ? 'btn-danger' : 'btn-success'} w-100 p-3 fw-bold">
                        <i class="fas fa-file-pdf"></i> تحميل البلاغ الرسمي فوراً
                    </button>
                </div>`;
        });
    } else {
        resArea.innerHTML = `<div class="alert alert-info text-center">${data.message}</div>`;
    }
}

function generateReport(title, law) {
    const story = document.querySelector('textarea').value;
    if(!story) { alert("يجب كتابة التفاصيل أولاً!"); return; }
    
    const content = `
        <div style="direction:rtl; font-family:Arial; padding:30px;">
            <h2 style="color:#c0392b; text-align:center;">بلاغ رسمي بخصوص ${title}</h2>
            <p>بناءً على المقتضيات القانونية: <b>${law}</b></p>
            <div style="border:1px solid #ccc; padding:20px; margin-top:20px;">
                <strong>وقائع الحالة:</strong><br>${story}
            </div>
            <p style="margin-top:40px;">تم تحريره بواسطة منصة حقي - المغرب</p>
        </div>`;
    
    html2pdf().from(content).save(`بلاغ_${title}.pdf`);
}
</script>

</body>
</html>
