<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>حقي 🇲🇦 Haqi Maroc</title>
</head>
<body>
    <div class="header">
        <div style="font-size: 40px; margin-bottom: 10px;">👑</div>
        <h1>المملكة المغربية</h1>
        <h2 style="margin:5px 0;">بوابة حقي (Haqi) الرقمية</h2>
        <p style="font-size:14px; opacity:0.9;">خدمة المواطن تحت شعار: الله - الوطن - الملك</p>
    </div>
    <div class="cards-grid" id="quick-cards"></div>
    <div id="editor-area" style="max-width:600px; margin:auto; padding:15px; display:none;"></div>

    <script src="/static/js/editor.js"></script>
    <script>
        async function load() {
            const res = await fetch('/get_cards');
            const cards = await res.json();
            document.getElementById('quick-cards').innerHTML = cards.map(c => `
                <div class="card" onclick="openEditor('${c.search_term}')">
                    <i class="fas ${c.icon}"></i>
                    <div>${c.title}</div>
                </div>`).join('');
        }
        load();
    </script>
</body>
</html>
