<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر الشكايات القانونية - Haqi Maroc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .editor-container { max-width: 900px; margin: 30px auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .preview-box { border: 2px dashed #dee2e6; padding: 40px; background: #fff; min-height: 400px; line-height: 1.8; white-space: pre-wrap; }
        .btn-action { border-radius: 30px; padding: 12px 25px; font-weight: bold; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container editor-container">
    <h2 class="text-center mb-4 text-success"><i class="fas fa-file-signature"></i> محرر الشكايات القانونية الذكي</h2>
    
    <div class="row g-4">
        <div class="col-md-5">
            <label class="form-label fw-bold">1. اختر نوع التظلم:</label>
            <select id="complaint-type" class="form-select mb-3" onchange="loadFields()">
                <option value="">-- اختر من القائمة --</option>
                <option value="rashwa">تبليغ عن رشوة</option>
                <option value="hakra">تظلم من شطط في السلطة</option>
            </select>

            <div id="dynamic-fields" class="mb-4">
                </div>

            <button onclick="buildComplaint()" class="btn btn-dark w-100 btn-action mb-2">تحديث المعاينة <i class="fas fa-sync"></i></button>
            <button onclick="downloadPDF()" class="btn btn-danger w-100 btn-action mb-2">تحميل بصيغة PDF <i class="fas fa-file-pdf"></i></button>
            <button onclick="shareWhatsApp()" class="btn btn-success w-100 btn-action">إرسال عبر واتساب <i class="fab fa-whatsapp"></i></button>
        </div>

        <div class="col-md-7">
            <label class="form-label fw-bold">2. المعاينة الرسمية:</label>
            <div id="complaint-preview" class="preview-box border rounded shadow-sm">
                يرجى اختيار نوع الشكاية وملء البيانات لتظهر المعاينة هنا...
            </div>
        </div>
    </div>
</div>

<script>
// القوالب القانونية (يمكنك لاحقاً جلبها من ملف JSON خارجي)
const templates = {
    rashwa: {
        title: "شكاية بخصوص طلب رشوة",
        recipient: "السيد وكيل الملك لدى المحكمة الابتدائية",
        body: "أتقدم لسيادتكم بهذه الشكاية قصد التبليغ عن واقعة ابتزاز تعرضت لها بتاريخ {date} في {location}، حيث طُلب مني مبلغ مالي مقابل خدمة إدارية، وهو ما يخالف الفصل 248 من القانون الجنائي المغربي.",
        fields: [{id: 'date', label: 'تاريخ الواقعة'}, {id: 'location', label: 'المكان/الإدارة'}]
    },
    hakra: {
        title: "تظلم بخصوص شطط في السلطة",
        recipient: "السيد عامل إقليم تاوريرت",
        body: "أرفع لسيادتكم هذا التظلم بخصوص تجاوز إداري (حكرة) تعرضت له في {department}، حيث تم الامتناع عن تقديم خدمة مشروعة بتاريخ {date}، مما يضر بمصالحي كمواطن.",
        fields: [{id: 'department', label: 'اسم المصلحة/الإدارة'}, {id: 'date', label: 'تاريخ التجاوز'}]
    }
};

function loadFields() {
    const type = document.getElementById('complaint-type').value;
    const fieldsDiv = document.getElementById('dynamic-fields');
    fieldsDiv.innerHTML = '';
    
    if (templates[type]) {
        templates[type].fields.forEach(f => {
            fieldsDiv.innerHTML += `
                <div class="mb-2">
                    <label class="small fw-bold">${f.label}:</label>
                    <input type="text" id="${f.id}" class="form-control" oninput="buildComplaint()">
                </div>`;
        });
    }
}

function buildComplaint() {
    const type = document.getElementById('complaint-type').value;
    if (!type) return;

    let content = `إلى: ${templates[type].recipient}\n\nالموضوع: ${templates[type].title}\n\n`;
    let body = templates[type].body;

    templates[type].fields.forEach(f => {
        const val = document.getElementById(f.id).value || `[${f.label}]`;
        body = body.replace(`{${f.id}}`, val);
    });

    content += body + `\n\nتوقيع المشتكي:\n.......................`;
    document.getElementById('complaint-preview').innerText = content;
}

function downloadPDF() {
    const element = document.getElementById('complaint-preview');
    html2pdf().from(element).save('شكاية_قانونية.pdf');
}

function shareWhatsApp() {
    const text = document.getElementById('complaint-preview').innerText;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}
</script>

</body>
</html>
